services:
  # ── Backend API ─────────────────────────────────────────────────
  - type: web
    name: tradeflow-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TWELVE_DATA_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./trading.db
      - key: ENVIRONMENT
        value: production
      - key: CORS_ALLOW_ALL
        value: "true"
    healthCheckPath: /health

  # ── Frontend Static Site ─────────────────────────────────────────
  - type: web
    name: tradeflow-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: tradeflow-api
          type: web
          property: host
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
